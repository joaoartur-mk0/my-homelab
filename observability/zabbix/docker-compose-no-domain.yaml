version: '3.8'

services:
  postgres-zabbix:
    image: postgres:15
    container_name: postgres-zabbix
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD}
      - POSTGRES_DB=zabbix
    volumes:
      - zabbix-db-data:/var/lib/postgresql/data
    networks:
      - zabbix-backend

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-latest
    container_name: zabbix-server
    restart: unless-stopped
    environment:
      - DB_SERVER_HOST=postgres-zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD}
      - POSTGRES_DB=zabbix
    ports:
      - "10051:10051"
    networks:
      - zabbix-backend
      - ${NETWORK_NAME} 
    depends_on:
      - postgres-zabbix

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:ubuntu-latest
    container_name: zabbix-web
    restart: unless-stopped
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=postgres-zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD}
      - POSTGRES_DB=zabbix
      - PHP_TZ=America/Sao_Paulo
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - zabbix-backend
    depends_on:
      - postgres-zabbix
      - zabbix-server

volumes:
  zabbix-db-data:

networks:
  zabbix-backend:
    driver: bridge
  # Sua rede global
  ${NETWORK_NAME}:
    external: true
